name: trading-engine

services:
  db:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - engine-data:/data/db

  engine:
    build: .
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      MONGO_URI: mongodb://db:27017/trading-app
    volumes:
      - market-uploads:/app/uploads
    depends_on:
      - db
    restart: unless-stopped
    networks:
      default:
        aliases:
          - app-chat # TEMP: remove once Cloudflare tunnel's Public Hostname target is updated to "engine"

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    env_file: .env
    depends_on:
      - engine

volumes:
  engine-data:
    name: engine-data
  market-uploads:
    name: market-uploads
